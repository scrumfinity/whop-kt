webhooks:
  invoice.created:
    post:
      tags:
        - Invoices
      summary: Invoice Created
      description: |-
        Sent when a invoice is created

        Required permissions:
         - `invoice:basic:read`
         - `webhook_receive:invoices`
      parameters:
        - name: webhook-id
          in: header
          required: true
          schema:
            type: string
            example: msg_xxxxxxxxxxxxxxxxxxxxxxxx
            description: A unique identifier for this webhook request
        - name: webhook-signature
          in: header
          required: true
          schema:
            type: string
            example: v1,BASE64ENCODEDSIGNATURE
            description: >-
              The signature of the webhook request with the webhook version
              prepended
        - name: webhook-timestamp
          in: header
          required: true
          schema:
            type: string
            example: '1727606400'
            description: >-
              The timestamp in seconds since the Unix epoch that the webhook was
              sent at on the server
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: A unique ID for every single webhook request
                  example: msg_xxxxxxxxxxxxxxxxxxxxxxxx
                api_version:
                  type: string
                  description: The API version for this webhook
                  example: v1
                  const: v1
                company_id:
                  type:
                    - string
                    - 'null'
                  description: The company ID that this webhook event is associated with
                  example: biz_xxxxxxxxxxxxxx
                timestamp:
                  type: string
                  format: date-time
                  description: >-
                    The timestamp in ISO 8601 format that the webhook was sent
                    at on the server
                  example: '2025-01-01T00:00:00.000Z'
                type:
                  type: string
                  description: The webhook event type
                  example: invoice.created
                  const: invoice.created
                data:
                  $ref: '#/components/schemas/Invoice'
              required:
                - id
                - api_version
                - timestamp
                - type
                - data
      responses:
        '200':
          description: >-
            Return a 200 status to indicate that the data was received
            successfully
