components:
  schemas:
    Visibility:
      type: string
      enum:
        - visible
        - hidden
        - archived
        - quick_link
      description: Visibility of a resource
    ProductListItem:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the product.
          example: prod_xxxxxxxxxxxxx
        title:
          type: string
          description: >-
            The display name of the product shown to customers on the product
            page and in search results.
          example: Pickaxe Analytics
        visibility:
          $ref: '#/components/schemas/Visibility'
          description: >-
            Controls whether the product is visible to customers. When set to
            'hidden', the product is only accessible via direct link.
        headline:
          type:
            - string
            - 'null'
          description: >-
            A short marketing headline displayed prominently on the product's
            product page.
          example: Real-time data analytics for creators
        verified:
          type: boolean
          description: >-
            Whether this company has been verified by Whop's trust and safety
            team.
        created_at:
          type: string
          format: date-time
          description: The datetime the product was created.
          example: '2023-12-01T05:00:00.401Z'
        updated_at:
          type: string
          format: date-time
          description: The datetime the product was last updated.
          example: '2023-12-01T05:00:00.401Z'
        member_count:
          type: integer
          description: >-
            The number of users who currently hold an active membership to this
            product. Returns 0 if the company has disabled public member counts.
          example: 42
        route:
          type: string
          description: >-
            The URL slug used in the product's public link (e.g., 'my-product'
            in whop.com/company/my-product).
          example: pickaxe-analytics
        published_reviews_count:
          type: integer
          description: >-
            The total number of published customer reviews for this product's
            company.
          example: 42
        external_identifier:
          type:
            - string
            - 'null'
          description: >-
            A unique identifier used to create or update products via the API.
            When provided on product creation endpoints, an existing product
            with this identifier will be updated instead of creating a new one.
          example: ext_prod_12345
      required:
        - id
        - title
        - visibility
        - headline
        - verified
        - created_at
        - updated_at
        - member_count
        - route
        - published_reviews_count
        - external_identifier
      description: >-
        A product is a digital good or service sold on Whop. Products contain
        plans for pricing and experiences for content delivery.
    PageInfo:
      type: object
      properties:
        end_cursor:
          type:
            - string
            - 'null'
          description: When paginating forwards, the cursor to continue.
        start_cursor:
          type:
            - string
            - 'null'
          description: When paginating backwards, the cursor to continue.
        has_next_page:
          type: boolean
          description: When paginating forwards, are there more items?
        has_previous_page:
          type: boolean
          description: When paginating backwards, are there more items?
      required:
        - end_cursor
        - start_cursor
        - has_next_page
        - has_previous_page
      description: Information about pagination in a connection.
    AccessPassTypes:
      type: string
      enum:
        - regular
        - app
        - experience_upsell
        - api_only
      description: >-
        The different types an product can be. Only use 'regular'. The rest are
        for internal use
    VisibilityFilter:
      type: string
      enum:
        - visible
        - hidden
        - archived
        - quick_link
        - all
        - not_quick_link
        - not_archived
      description: The different levels of visibility for resources
    AccessPassOrder:
      type: string
      enum:
        - active_memberships_count
        - created_at
        - usd_gmv
        - usd_gmv_30_days
      description: The ways a relation of AccessPasses can be ordered
    Direction:
      type: string
      enum:
        - asc
        - desc
      description: The direction of the sort.
    CustomCtas:
      type: string
      enum:
        - get_access
        - join
        - order_now
        - shop_now
        - call_now
        - donate_now
        - contact_us
        - sign_up
        - subscribe
        - purchase
        - get_offer
        - apply_now
        - complete_order
      description: The different types of custom CTAs that can be selected.
    GlobalAffiliateStatuses:
      type: string
      enum:
        - enabled
        - disabled
      description: The different statuses of the global affiliate program for a product.
    ProductTaxCodeProductTypes:
      type: string
      enum:
        - physical
        - digital
        - services
      description: The product_type of the ProductTaxCode
    Product:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the product.
          example: prod_xxxxxxxxxxxxx
        title:
          type: string
          description: >-
            The display name of the product shown to customers on the product
            page and in search results.
          example: Pickaxe Analytics
        visibility:
          $ref: '#/components/schemas/Visibility'
          description: >-
            Controls whether the product is visible to customers. When set to
            'hidden', the product is only accessible via direct link.
        headline:
          type:
            - string
            - 'null'
          description: >-
            A short marketing headline displayed prominently on the product's
            product page.
          example: Real-time data analytics for creators
        verified:
          type: boolean
          description: >-
            Whether this company has been verified by Whop's trust and safety
            team.
        created_at:
          type: string
          format: date-time
          description: The datetime the product was created.
          example: '2023-12-01T05:00:00.401Z'
        updated_at:
          type: string
          format: date-time
          description: The datetime the product was last updated.
          example: '2023-12-01T05:00:00.401Z'
        member_count:
          type: integer
          description: >-
            The number of users who currently hold an active membership to this
            product. Returns 0 if the company has disabled public member counts.
          example: 42
        route:
          type: string
          description: >-
            The URL slug used in the product's public link (e.g., 'my-product'
            in whop.com/company/my-product).
          example: pickaxe-analytics
        published_reviews_count:
          type: integer
          description: >-
            The total number of published customer reviews for this product's
            company.
          example: 42
        external_identifier:
          type:
            - string
            - 'null'
          description: >-
            A unique identifier used to create or update products via the API.
            When provided on product creation endpoints, an existing product
            with this identifier will be updated instead of creating a new one.
          example: ext_prod_12345
        description:
          type:
            - string
            - 'null'
          description: >-
            A brief summary of what the product offers, displayed on product
            pages and search results.
          example: Track your revenue, members, and growth in real time.
        custom_cta:
          $ref: '#/components/schemas/CustomCtas'
          description: >-
            The call-to-action button label displayed on the product's purchase
            page (e.g., 'join', 'buy', 'subscribe').
        custom_cta_url:
          type:
            - string
            - 'null'
          description: >-
            An optional URL that the call-to-action button links to instead of
            the default checkout flow. Null if no custom URL is set.
          example: https://example.com/signup
        custom_statement_descriptor:
          type:
            - string
            - 'null'
          description: >-
            A custom text label that appears on the customer's bank or credit
            card statement for purchases of this product. Maximum 22 characters,
            including the required prefix WHOP*.
          example: PICKAXE
        global_affiliate_percentage:
          type:
            - number
            - 'null'
          description: >-
            The commission rate (as a percentage) that affiliates earn on sales
            through the Whop marketplace global affiliate program. Null if the
            program is not active.
          example: 6.9
        global_affiliate_status:
          $ref: '#/components/schemas/GlobalAffiliateStatuses'
          description: >-
            The enrollment status of this product in the Whop marketplace global
            affiliate program.
        member_affiliate_percentage:
          type:
            - number
            - 'null'
          description: >-
            The commission rate (as a percentage) that existing members earn
            when referring new customers through the member affiliate program.
            Null if the program is not active.
          example: 6.9
        member_affiliate_status:
          $ref: '#/components/schemas/GlobalAffiliateStatuses'
          description: >-
            The enrollment status of this product in the member affiliate
            program.
        gallery_images:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: >-
                  Represents a unique identifier that is Base64 obfuscated. It
                  is often used to refetch an object or as key for a cache. The
                  ID type appears in a JSON response as a String; however, it is
                  not intended to be human-readable. When expected as an input
                  type, any string (such as `"VXNlci0xMA=="`) or integer (such
                  as `4`) input value will be accepted as an ID.
              url:
                type:
                  - string
                  - 'null'
                description: >-
                  A pre-optimized URL for rendering this attachment on the
                  client. This should be used for displaying attachments in
                  apps.
                example: https://media.whop.com/abc123/optimized.jpg
            required:
              - id
              - url
            description: Represents an image attachment
          description: The gallery images for this product, ordered by position.
        product_tax_code:
          type:
            - object
            - 'null'
          properties:
            id:
              type: string
              description: The unique identifier for the product tax code.
              example: ptc_xxxxxxxxxxxxxx
            name:
              type: string
              description: >-
                The human-readable name of this tax classification (e.g.,
                'Digital - SaaS').
              example: Digital - SaaS
            product_type:
              $ref: '#/components/schemas/ProductTaxCodeProductTypes'
              description: >-
                The broad product category this tax code covers (e.g., physical
                goods, digital services).
          required:
            - id
            - name
            - product_type
          description: >-
            The tax classification code applied to purchases of this product for
            sales tax calculation. Null if no tax code is assigned.
        owner_user:
          type: object
          properties:
            id:
              type: string
              description: The unique identifier for the user.
              example: user_xxxxxxxxxxxxx
            name:
              type:
                - string
                - 'null'
              description: The user's display name shown on their public profile.
              example: John Doe
            username:
              type: string
              description: The user's unique username shown on their public profile.
              example: johndoe42
          required:
            - id
            - name
            - username
          description: The user who owns the company that sells this product.
        company:
          type: object
          properties:
            id:
              type: string
              description: The unique identifier for the company.
              example: biz_xxxxxxxxxxxxxx
            route:
              type: string
              description: >-
                The URL slug for the company's store page (e.g., 'pickaxe' in
                whop.com/pickaxe).
              example: pickaxe
            title:
              type: string
              description: The display name of the company shown to customers.
              example: Pickaxe
          required:
            - id
            - route
            - title
          description: The company this product belongs to.
      required:
        - id
        - title
        - visibility
        - headline
        - verified
        - created_at
        - updated_at
        - member_count
        - route
        - published_reviews_count
        - external_identifier
        - description
        - custom_cta
        - custom_cta_url
        - custom_statement_descriptor
        - global_affiliate_percentage
        - global_affiliate_status
        - member_affiliate_percentage
        - member_affiliate_status
        - gallery_images
        - product_tax_code
        - owner_user
        - company
