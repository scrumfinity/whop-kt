            schema:
              type: object
              properties:
                ai_prompt_id:
                  type:
                    - string
                    - 'null'
                  description: >-
                    The identifier of the AI prompt that generated this build,
                    if applicable.
                  example: prmt_xxxxxxxxxxxxx
                app_id:
                  type:
                    - string
                    - 'null'
                  description: >-
                    The unique identifier of the app to create the build for.
                    Defaults to the app associated with the current API key.
                  example: app_xxxxxxxxxxxxxx
                attachment:
                  type: object
                  properties:
                    id:
                      type: string
                      description: The ID of an existing file object.
                  required:
                    - id
                  description: >-
                    The build file to upload. For iOS and Android, this should
                    be a .zip archive containing a main_js_bundle.hbc file and
                    an optional assets folder. For web, this should be a
                    JavaScript file.
                  title: FileInputWithId
                checksum:
                  type: string
                  description: >-
                    A client-generated checksum of the build file, used to
                    verify file integrity when unpacked on a device.
                platform:
                  $ref: '#/components/schemas/AppBuildPlatforms'
                  description: >-
                    The target platform for the build. Accepted values: ios,
                    android, web.
                supported_app_view_types:
                  type:
                    - array
                    - 'null'
                  items:
                    $ref: '#/components/schemas/AppViewTypes'
                  description: >-
                    The view types this build supports. A build can support
                    multiple view types but should only list the ones its code
                    implements.
              required:
                - attachment
                - checksum
                - platform
              description: Parameters for CreateAppBuild
