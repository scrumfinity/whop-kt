          example: '2023-12-01T05:00:00.401Z'
        currency:
          oneOf:
            - $ref: '#/components/schemas/Currencies'
            - type: 'null'
          description: >-
            The three-letter ISO currency code for this payment (e.g., 'usd',
            'eur').
        total:
          type:
            - number
            - 'null'
          description: The total to show to the creator (excluding buyer fees).
          example: 6.9
        failure_message:
          type:
            - string
            - 'null'
          description: If the payment failed, the reason for the failure.
      required:
        - id
        - status
        - created_at
        - paid_at
        - currency
        - total
        - failure_message
      description: >-
        A payment represents a completed or attempted charge. Payments track the
        amount, status, currency, and payment method used.
    PermissionSystemRoles:
      type: string
      enum:
        - owner
        - admin
        - moderator
        - sales_manager
        - advertiser
      description: The different system roles that can be assigned.
    FeeMarkup:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the fee markup.
        fee_type:
          $ref: '#/components/schemas/FeeMarkupTypes'
          description: The category of fee this markup applies to.
        percentage_fee:
          type:
            - number
            - 'null'
          description: >-
            A percentage-based fee charged per transaction. Ranges from 0 to 25.
            Null if no percentage fee is configured.
          example: 6.9
        fixed_fee_usd:
          type:
            - number
            - 'null'
          description: >-
            A flat fee charged per transaction, in USD. Ranges from 0 to 50.
            Null if no fixed fee is configured.
          example: 6.9
        notes:
          type:
            - string
            - 'null'
          description: >-
            Internal notes about this fee markup, visible only to
            administrators. Null if no notes have been added.
          example: Approved by finance team on 2024-01-15
        created_at:
          type: string
          format: date-time
          description: The datetime the fee markup was created.
          example: '2023-12-01T05:00:00.401Z'
        updated_at:
          type: string
          format: date-time
          description: The datetime the fee markup was last updated.
          example: '2023-12-01T05:00:00.401Z'
      required:
        - id
        - fee_type
        - percentage_fee
        - fixed_fee_usd
        - notes
        - created_at
        - updated_at
      description: >-
        A fee markup configuration that defines additional charges applied to
        transactions for a platform's connected accounts.
    MembershipCancellationModes:
      type: string
      enum:
        - at_period_end
        - immediate
      description: The mode of cancellation for a membership
    ForumPostVisibilityTypes:
      type: string
      enum:
        - members_only
        - globally_visible
      description: The visibility types for forum posts
    AccessToken:
      type: object
      properties:
        token:
          type: string
          description: >-
            The signed JWT access token string to include in API request
            Authorization headers.
        expires_at:
          type: string
          format: date-time
          description: >-
            The timestamp after which this access token is no longer valid and
            must be refreshed.
          example: '2023-12-01T05:00:00.401Z'
      required:
        - token
        - expires_at
      description: >-
        A short-lived access token used to authenticate API requests on behalf
        of a user.
    AccountLink:
      type: object
      properties:
        url:
          type: string
          description: >-
            The temporary URL to redirect the user to for account access.
            Expires at the time specified by expires_at.
          example: https://whop.com/payouts/biz_xxxxxxxxx/verify
        expires_at:
          type: string
          format: date-time
          description: The timestamp after which this account link URL is no longer valid.
          example: '2023-12-01T05:00:00.401Z'
      required:
        - url
        - expires_at
      description: >-
        A temporary, time-limited URL that grants a user access to an external
        account management page.
