      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ad_creative_set_ids:
                  type:
                    - array
                    - 'null'
                  items:
                    type: string
                    description: >-
                      Represents a unique identifier that is Base64 obfuscated.
                      It is often used to refetch an object or as key for a
                      cache. The ID type appears in a JSON response as a String;
                      however, it is not intended to be human-readable. When
                      expected as an input type, any string (such as
                      `"VXNlci0xMA=="`) or integer (such as `4`) input value
                      will be accepted as an ID.
                  description: Array of creative set IDs to link to this campaign.
                budget:
                  type:
                    - number
                    - 'null'
                  description: Budget amount in dollars.
                  example: 6.9
                budget_type:
                  oneOf:
                    - $ref: '#/components/schemas/AdBudgetTypes'
                    - type: 'null'
                  description: Whether the budget is daily or lifetime.
                company_id:
                  type: string
                  description: The company ID to create this ad campaign for.
                  example: biz_xxxxxxxxxxxxxx
                config:
                  type: object
                  properties:
                    objective:
                      oneOf:
                        - $ref: '#/components/schemas/CampaignConfigObjective'
                        - type: 'null'
                      description: >-
                        The campaign objective that determines how Meta
                        optimizes delivery.
                    bid_strategy:
                      oneOf:
                        - $ref: '#/components/schemas/CampaignConfigBidStrategy'
                        - type: 'null'
                      description: >-
                        The bidding strategy used to optimize spend for this
                        campaign.
                    bid_amount:
                      type:
                        - integer
                        - 'null'
                      description: >-
                        Bid cap amount in cents. Only used when bid_strategy is
                        bid_cap.
                      example: 42
                    status:
                      oneOf:
                        - $ref: '#/components/schemas/CampaignConfigStatus'
                        - type: 'null'
                      description: >-
                        The campaign status as set by the advertiser (active or
                        paused).
                    special_categories:
                      type:
                        - array
                        - 'null'
                      items:
                        type: string
                        description: >-
                          Represents textual data as UTF-8 character sequences.
                          This type is most often used by GraphQL to represent
                          free-form human-readable text.
                      description: >-
                        Special ad categories required by the platform (e.g.,
                        housing, employment, credit).
                    budget_optimization:
                      type:
                        - boolean
                        - 'null'
                      description: >-
                        Whether campaign budget optimization (CBO) is enabled,
                        allowing the platform to distribute budget across ad
                        groups.
                    lifetime_budget:
                      type:
                        - integer
                        - 'null'
                      description: >-
                        Represents non-fractional signed whole numeric values.
                        Int can represent values between -(2^31) and 2^31 - 1.
                      example: 42
                    start_time:
                      type:
                        - string
                        - 'null'
                      description: The scheduled start time of the campaign (ISO8601).
                    end_time:
                      type:
                        - string
                        - 'null'
                      description: The scheduled end time of the campaign (ISO8601).
                  required: []
                  description: >-
                    Unified campaign configuration (conversion goal, budget,
                    bidding, etc.).
                daily_budget:
                  type:
                    - number
                    - 'null'
                  description: >-
                    Daily budget in dollars (minimum $5). Required unless
                    lifetime_budget is set in config.
                  example: 6.9
                platform:
                  $ref: '#/components/schemas/AdCampaignPlatforms'
                  description: The ad platform to run on (e.g., meta, tiktok).
                product_id:
                  type:
                    - string
                    - 'null'
                  description: The unique identifier of the product to promote.
                  example: prod_xxxxxxxxxxxxx
                target_country_codes:
                  type:
                    - array
                    - 'null'
                  items:
                    type: string
                    description: >-
                      Represents textual data as UTF-8 character sequences. This
                      type is most often used by GraphQL to represent free-form
                      human-readable text.
                  description: Array of ISO3166 country codes for territory targeting.
                title:
                  type: string
                  description: The title of the ad campaign. Must be max 100 characters.
              required:
                - company_id
                - config
                - platform
                - title
              description: Parameters for CreateAdCampaignV2
      x-codeSamples:
        - lang: JavaScript
          source: |-
            import Whop from '@whop/sdk';

            const client = new Whop({
              apiKey: process.env['WHOP_API_KEY'], // This is the default and can be omitted
            });

