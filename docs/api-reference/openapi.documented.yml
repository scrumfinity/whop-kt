    post:
      tags:
        - Payments
      operationId: createPayment
      summary: Create payment
      description: >-
        Charge an existing member off-session using one of their stored payment
        methods. You can provide an existing plan, or create a new one in-line.
        This endpoint will respond with a payment object immediately, but the
        payment is processed asynchronously in the background. Use webhooks to
        be notified when the payment succeeds or fails.


        Required permissions:
         - `payment:charge`
         - `plan:create`
         - `access_pass:create`
         - `access_pass:update`
         - `plan:basic:read`
         - `access_pass:basic:read`
         - `member:email:read`
         - `member:basic:read`
         - `member:phone:read`
         - `promo_code:basic:read`
         - `payment:dispute:read`
         - `payment:resolution_center_case:read`
