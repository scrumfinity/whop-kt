      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                adaptive_pricing_enabled:
                  type:
                    - boolean
                    - 'null'
                  description: >-
                    Whether this plan accepts local currency payments via
                    adaptive pricing.
                billing_period:
                  type:
                    - integer
                    - 'null'
                  description: >-
                    The number of days between recurring charges. For example,
                    30 for monthly or 365 for yearly.
                  example: 42
                company_id:
                  type: string
                  description: >-
                    The unique identifier of the company to create this plan
                    for.
                  example: biz_xxxxxxxxxxxxxx
                currency:
                  oneOf:
                    - $ref: '#/components/schemas/Currencies'
                    - type: 'null'
                  description: >-
                    The three-letter ISO currency code for the plan's pricing.
                    Defaults to USD.
                custom_fields:
                  type:
                    - array
                    - 'null'
                  items:
                    type: object
                    properties:
                      field_type:
                        $ref: '#/components/schemas/CustomFieldTypes'
                        description: The type of the custom field.
                      id:
                        type:
                          - string
                          - 'null'
                        description: The ID of the custom field (if being updated)
                      name:
                        type: string
                        description: The name of the custom field.
                      order:
                        type:
                          - integer
                          - 'null'
                        description: The order of the field.
                        example: 42
                      placeholder:
                        type:
                          - string
                          - 'null'
                        description: The placeholder value of the field.
                      required:
                        type:
                          - boolean
                          - 'null'
                        description: Whether or not the field is required.
                    required:
                      - field_type
                      - name
                  description: >-
                    An array of custom field definitions to collect from
                    customers at checkout.
                description:
                  type:
                    - string
                    - 'null'
                  description: >-
                    A text description of the plan displayed to customers on the
                    product page.
                expiration_days:
                  type:
                    - integer
                    - 'null'
                  description: >-
                    The number of days until the membership expires and access
                    is revoked. Used for expiration-based plans.
                  example: 42
                image:
                  type:
                    - object
                    - 'null'
                  properties:
                    id:
                      type: string
                      description: The ID of an existing file object.
                  required:
                    - id
                  description: >-
                    An image displayed on the product page to represent this
                    plan.
                  title: FileInputWithId
                initial_price:
                  type:
                    - number
                    - 'null'
                  description: >-
                    The amount charged on the first purchase. For one-time
                    plans, this is the full price. For recurring plans, this is
                    an additional charge on top of the renewal price. Provided
                    in the plan's currency (e.g., 10.43 for $10.43).
                  example: 6.9
                internal_notes:
                  type:
                    - string
                    - 'null'
                  description: >-
                    Private notes visible only to the business owner. Not shown
                    to customers.
                legacy_payment_method_controls:
                  type:
                    - boolean
                    - 'null'
                  description: Whether this plan uses legacy payment method controls.
                override_tax_type:
                  oneOf:
                    - $ref: '#/components/schemas/TaxTypes'
                    - type: 'null'
                  description: >-
                    Override the default tax classification for this specific
                    plan.
                payment_method_configuration:
                  type:
                    - object
                    - 'null'
                  properties:
                    disabled:
                      type: array
                      items:
                        $ref: '#/components/schemas/PaymentMethodTypes'
                      description: >-
                        An array of payment method identifiers that are
                        explicitly disabled. Only applies if the
                        include_platform_defaults is true.
                    enabled:
                      type: array
                      items:
                        $ref: '#/components/schemas/PaymentMethodTypes'
                      description: >-
                        An array of payment method identifiers that are
                        explicitly enabled. This means these payment methods
                        will be shown on checkout. Example use case is to only
                        enable a specific payment method like cashapp, or
                        extending the platform defaults with additional methods.
                    include_platform_defaults:
                      type:
                        - boolean
                        - 'null'
                      description: >-
                        Whether Whop's platform default payment method
                        enablement settings are included in this configuration.
                        The full list of default payment methods can be found in
                        the documentation at docs.whop.com/payments.
                  required:
                    - disabled
                    - enabled
                  description: >-
                    Explicit payment method configuration for the plan. When not
                    provided, the company's defaults apply.
                plan_type:
                  oneOf:
                    - $ref: '#/components/schemas/PlanTypes'
                    - type: 'null'
                  description: The billing type of the plan, such as one_time or recurring.
                product_id:
                  type: string
                  description: The unique identifier of the product to attach this plan to.
                  example: prod_xxxxxxxxxxxxx
                release_method:
                  oneOf:
                    - $ref: '#/components/schemas/ReleaseMethod'
                    - type: 'null'
                  description: >-
                    The method used to sell this plan (e.g., buy_now, waitlist,
                    application).
                renewal_price:
                  type:
                    - number
                    - 'null'
                  description: >-
                    The amount charged each billing period for recurring plans.
                    Provided in the plan's currency (e.g., 10.43 for $10.43).
                  example: 6.9
                split_pay_required_payments:
                  type:
                    - integer
                    - 'null'
                  description: >-
                    The number of installment payments required before the
                    subscription pauses.
                  example: 42
                stock:
                  type:
                    - integer
                    - 'null'
                  description: >-
                    The maximum number of units available for purchase. Ignored
                    when unlimited_stock is true.
                  example: 42
                title:
                  type:
                    - string
                    - 'null'
                  description: >-
                    The display name of the plan shown to customers on the
                    product page.
                trial_period_days:
                  type:
                    - integer
                    - 'null'
                  description: >-
                    The number of free trial days before the first charge on a
                    recurring plan.
                  example: 42
                unlimited_stock:
                  type:
                    - boolean
                    - 'null'
                  description: >-
                    Whether the plan has unlimited stock. When true, the stock
                    field is ignored. Defaults to true.
                visibility:
                  oneOf:
                    - $ref: '#/components/schemas/Visibility'
                    - type: 'null'
                  description: >-
                    Whether the plan is visible to customers or hidden from
                    public view.
                checkout_styling:
                  type:
                    - object
                    - 'null'
                  properties:
                    background_color:
                      type:
                        - string
                        - 'null'
                      description: >-
                        A hex color code for the checkout page background,
                        applied to the order summary panel (e.g. #F4F4F5).
                    border_style:
                      oneOf:
                        - $ref: '#/components/schemas/CheckoutShapes'
                        - type: 'null'
                      description: The border style for buttons and inputs.
                    button_color:
                      type:
                        - string
                        - 'null'
                      description: 'A hex color code for the button color (e.g. #FF5733).'
                    font_family:
                      oneOf:
                        - $ref: '#/components/schemas/CheckoutFonts'
                        - type: 'null'
                      description: The font family for the checkout page.
                  required: []
                  description: >-
                    Checkout styling overrides for this plan. Pass null to
                    inherit from the company default.
              required:
                - company_id
                - product_id
              description: Parameters for CreatePlan
