      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                collect_shipping_address:
                  type:
                    - boolean
                    - 'null'
                  description: >-
                    Whether the checkout flow collects a shipping address from
                    the customer.
                company_id:
                  type: string
                  description: >-
                    The unique identifier of the company to create this product
                    for.
                  example: biz_xxxxxxxxxxxxxx
                custom_cta:
                  oneOf:
                    - $ref: '#/components/schemas/CustomCtas'
                    - type: 'null'
                  description: >-
                    The call-to-action button label displayed on the product's
                    purchase page (e.g., join, buy, subscribe).
                custom_cta_url:
                  type:
                    - string
                    - 'null'
                  description: >-
                    A URL that the call-to-action button links to instead of the
                    default checkout flow.
                custom_statement_descriptor:
                  type:
                    - string
                    - 'null'
                  description: >-
                    A custom text label that appears on the customer's bank
                    statement. Must be 5-22 characters, contain at least one
                    letter, and not contain <, >, \, ', or " characters.
                description:
                  type:
                    - string
                    - 'null'
                  description: >-
                    A written description of the product displayed on its
                    product page.
                experience_ids:
                  type:
                    - array
                    - 'null'
                  items:
                    type: string
                    description: >-
                      Represents a unique identifier that is Base64 obfuscated.
                      It is often used to refetch an object or as key for a
                      cache. The ID type appears in a JSON response as a String;
                      however, it is not intended to be human-readable. When
                      expected as an input type, any string (such as
                      `"VXNlci0xMA=="`) or integer (such as `4`) input value
                      will be accepted as an ID.
                  description: >-
                    The unique identifiers of experiences to connect to this
                    product.
                global_affiliate_percentage:
                  type:
                    - number
                    - 'null'
                  description: >-
                    The commission rate as a percentage that affiliates earn
                    through the global affiliate program.
                  example: 6.9
                global_affiliate_status:
                  oneOf:
                    - $ref: '#/components/schemas/GlobalAffiliateStatuses'
                    - type: 'null'
                  description: >-
                    The enrollment status of this product in the global
                    affiliate program.
                headline:
                  type:
                    - string
                    - 'null'
                  description: >-
                    A short marketing headline displayed prominently on the
                    product page.
                member_affiliate_percentage:
                  type:
                    - number
                    - 'null'
                  description: >-
                    The commission rate as a percentage that members earn
                    through the member affiliate program.
                  example: 6.9
                member_affiliate_status:
                  oneOf:
                    - $ref: '#/components/schemas/GlobalAffiliateStatuses'
                    - type: 'null'
                  description: >-
                    The enrollment status of this product in the member
                    affiliate program.
                plan_options:
                  type:
                    - object
                    - 'null'
                  properties:
                    base_currency:
                      oneOf:
                        - $ref: '#/components/schemas/Currencies'
                        - type: 'null'
                      description: The respective currency identifier for the plan.
                    billing_period:
                      type:
                        - integer
                        - 'null'
                      description: The interval at which the plan charges (renewal plans).
                      example: 42
                    custom_fields:
                      type:
                        - array
                        - 'null'
                      items:
                        type: object
                        properties:
                          field_type:
                            $ref: '#/components/schemas/CustomFieldTypes'
                            description: The type of the custom field.
                          id:
                            type:
                              - string
                              - 'null'
                            description: The ID of the custom field (if being updated)
                          name:
                            type: string
                            description: The name of the custom field.
                          order:
                            type:
                              - integer
                              - 'null'
                            description: The order of the field.
                            example: 42
                          placeholder:
                            type:
                              - string
                              - 'null'
                            description: The placeholder value of the field.
                          required:
                            type:
                              - boolean
                              - 'null'
                            description: Whether or not the field is required.
                        required:
                          - field_type
                          - name
                      description: An array of custom field objects.
                    initial_price:
                      type:
                        - number
                        - 'null'
                      description: >-
                        An additional amount charged upon first purchase.
                        Provided as a number in the specified currency. Eg:
                        10.43 for $10.43 USD.
                      example: 6.9
                    plan_type:
                      oneOf:
                        - $ref: '#/components/schemas/PlanTypes'
                        - type: 'null'
                      description: >-
                        Indicates if the plan is a one time payment or
                        recurring.
                    release_method:
                      oneOf:
                        - $ref: '#/components/schemas/ReleaseMethod'
                        - type: 'null'
                      description: The method by which the plan is released to the public.
                    renewal_price:
                      type:
                        - number
                        - 'null'
                      description: >-
                        The amount the customer is charged every billing period.
                        Provided as a number in the specified currency. Eg:
                        10.43 for $10.43 USD.
                      example: 6.9
                    visibility:
                      oneOf:
                        - $ref: '#/components/schemas/Visibility'
                        - type: 'null'
                      description: The visibility of the plan.
                  required: []
                  description: >-
                    Configuration for an automatically generated plan to attach
                    to this product.
                product_tax_code_id:
                  type:
                    - string
                    - 'null'
                  description: >-
                    The unique identifier of the tax classification code to
                    apply to this product.
                  example: ptc_xxxxxxxxxxxxxx
                redirect_purchase_url:
                  type:
                    - string
                    - 'null'
                  description: >-
                    A URL to redirect the customer to after completing a
                    purchase.
                route:
                  type:
                    - string
                    - 'null'
                  description: The URL slug for the product's public link.
                send_welcome_message:
                  type:
                    - boolean
                    - 'null'
                  description: >-
                    Whether to send an automated welcome message via support
                    chat when a user joins this product. Defaults to true.
                title:
                  type: string
                  description: The display name of the product. Maximum 80 characters.
                visibility:
                  oneOf:
                    - $ref: '#/components/schemas/Visibility'
                    - type: 'null'
                  description: >-
                    Whether the product is visible to customers. When set to
                    hidden, the product is only accessible via direct link.
              required:
                - company_id
                - title
              description: Parameters for CreateAccessPass
      x-codeSamples:
        - lang: JavaScript
          source: >-
            import Whop from '@whop/sdk';


            const client = new Whop({
              apiKey: process.env['WHOP_API_KEY'], // This is the default and can be omitted
            });


            const product = await client.products.create({ company_id:
            'biz_xxxxxxxxxxxxxx', title: 'title' });


            console.log(product.id);
        - lang: Python
          source: |-
            import os
            from whop_sdk import Whop

            client = Whop(
                api_key=os.environ.get("WHOP_API_KEY"),  # This is the default and can be omitted
            )
            product = client.products.create(
                company_id="biz_xxxxxxxxxxxxxx",
                title="title",
            )
            print(product.id)
        - lang: Ruby
          source: >-
            require "whop_sdk"


            whop = WhopSDK::Client.new(api_key: "My API Key")


            product = whop.products.create(company_id: "biz_xxxxxxxxxxxxxx",
            title: "title")


            puts(product)
