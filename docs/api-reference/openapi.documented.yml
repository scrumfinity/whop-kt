      operationId: listForum
      summary: List forums
      description: >-
        Returns a paginated list of forums within a specific company, with
        optional filtering by product.


        Required permissions:
         - `forum:read`
      parameters:
        - name: after
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
