                  type:
                    - number
                    - 'null'
                  description: >-
                    A comparison price displayed with a strikethrough for the
                    initial price. Provided in the plan's currency (e.g., 19.99
                    for $19.99).
                  example: 6.9
                strike_through_renewal_price:
                  type:
                    - number
                    - 'null'
                  description: >-
