                    renewal price. Provided in the plan's currency (e.g., 19.99
                    for $19.99).
                  example: 6.9
                title:
                  type:
                    - string
                    - 'null'
                  description: >-
                    The display name of the plan shown to customers on the
                    product page.
                trial_period_days:
                  type:
                    - integer
                    - 'null'
                  description: >-
                    The number of free trial days before the first charge on a
