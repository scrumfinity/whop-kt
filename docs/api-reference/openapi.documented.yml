  /ads/{id}:
    get:
      tags:
        - Ads
      operationId: retrieveAd
      summary: Retrieve ad
      description: |-
        Retrieve an ad by its unique identifier.

        Required permissions:
         - `ad_campaign:basic:read`
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the ad.
          schema:
            type: string
            example: xad_xxxxxxxxxxxxxx
      x-group-title: Ads
      security:
        - bearerAuth:
            - ad_campaign:basic:read
      responses:
        '200':
          description: A successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ad'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                      message:
                        type: string
                      code:
                        type:
                          - string
                          - 'null'
                        description: >-
                          A short string indicating the specific error code,
                          e.g. 'parameter_missing', 'parameter_invalid',
                          'invalid_json'
                      param:
                        type:
                          - string
                          - 'null'
                        description: The parameter that caused the error, if applicable
                    required:
                      - type
                      - message
                required:
                  - error
              example:
                error:
                  type: invalid_request_error
                  code: parameter_invalid
                  message: Invalid request parameters.
                  param: null
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      type:
