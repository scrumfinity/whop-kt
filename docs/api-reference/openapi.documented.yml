    PlanListItem:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the plan.
          example: plan_xxxxxxxxxxxxx
        created_at:
          type: string
          format: date-time
          description: The datetime the plan was created.
          example: '2023-12-01T05:00:00.401Z'
        updated_at:
          type: string
          format: date-time
          description: The datetime the plan was last updated.
          example: '2023-12-01T05:00:00.401Z'
        visibility:
          $ref: '#/components/schemas/Visibility'
          description: >-
            Controls whether the plan is visible to customers. When set to
            'hidden', the plan is only accessible via direct link.
        plan_type:
          $ref: '#/components/schemas/PlanTypes'
          description: >-
            The billing model for this plan: 'renewal' for recurring
            subscriptions or 'one_time' for single payments.
        release_method:
          $ref: '#/components/schemas/ReleaseMethod'
          description: >-
            The method used to sell this plan: 'buy_now' for immediate purchase
            or 'waitlist' for waitlist-based access.
        currency:
          $ref: '#/components/schemas/Currencies'
          description: >-
            The currency used for all prices on this plan (e.g., 'usd', 'eur').
            All monetary amounts on the plan are denominated in this currency.
        company:
          type:
            - object
            - 'null'
          properties:
            id:
              type: string
              description: The unique identifier for the company.
              example: biz_xxxxxxxxxxxxxx
            title:
              type: string
              description: The display name of the company shown to customers.
              example: Pickaxe
          required:
            - id
            - title
          description: >-
            The company that sells this plan. Null for standalone invoice plans
            not linked to a company.
        product:
          type:
            - object
            - 'null'
          properties:
            id:
              type: string
              description: The unique identifier for the product.
              example: prod_xxxxxxxxxxxxx
            title:
              type: string
              description: >-
                The display name of the product shown to customers on the
                product page and in search results.
              example: Pickaxe Analytics
          required:
            - id
            - title
          description: >-
            The product that this plan belongs to. Null for standalone one-off
            purchases not linked to a product.
        invoice:
          type:
            - object
            - 'null'
          properties:
            id:
              type: string
              description: The unique identifier for the invoice.
              example: inv_xxxxxxxxxxxxxx
          required:
            - id
          description: >-
            The invoice this plan was generated for. Null if the plan was not
            created for a specific invoice.
        billing_period:
          type:
            - integer
            - 'null'
          description: >-
            The number of days between each recurring charge. Null for one-time
            plans. For example, 30 for monthly or 365 for annual billing.
          example: 42
        title:
          type:
            - string
            - 'null'
          description: >-
            The display name of the plan shown to customers on the product page
            and at checkout. Maximum 30 characters. Null if no title has been
            set.
          example: Pro Monthly
        description:
          type:
            - string
            - 'null'
          description: >-
            A text description of the plan visible to customers. Maximum 1000
            characters. Null if no description is set.
          example: Monthly access to all premium analytics dashboards and data exports.
        purchase_url:
          type: string
          description: >-
            The full URL where customers can purchase this plan directly,
            bypassing the product page.
          example: https://whop.com/pickaxe-analytics/checkout/plan_abc123
        expiration_days:
          type:
            - integer
            - 'null'
          description: >-
            The number of days until the membership expires (for
            expiration-based plans). For example, 365 for a one-year access
            pass.
          example: 42
        initial_price:
          type: number
          description: >-
            The initial purchase price in the plan's base_currency (e.g., 49.99
            for $49.99). For one-time plans, this is the full price. For renewal
            plans, this is charged on top of the first renewal_price.
          example: 6.9
        renewal_price:
          type: number
          description: >-
            The recurring price charged every billing_period in the plan's
            base_currency (e.g., 9.99 for $9.99/period). Zero for one-time
            plans.
          example: 6.9
        trial_period_days:
          type:
            - integer
            - 'null'
          description: >-
            The number of free trial days before the first charge on a renewal
            plan. Null if no trial is configured or the current user has already
            used a trial for this plan.
          example: 42
        member_count:
          type:
            - integer
            - 'null'
          description: >-
            The number of users who currently hold an active membership through
            this plan. Only visible to authorized team members.
          example: 42
        internal_notes:
          type:
            - string
            - 'null'
          description: >-
            Private notes visible only to the company owner and team members.
            Not shown to customers. Null if no notes have been added.
          example: Black Friday 2024 promo plan - expires Dec 1
        stock:
          type:
            - integer
            - 'null'
          description: >-
            The number of units available for purchase. Only visible to
            authorized team members. Null if the requester lacks permission.
          example: 42
        unlimited_stock:
          type: boolean
          description: >-
            When true, the plan has unlimited stock (stock field is ignored).
            When false, purchases are limited by the stock field.
        split_pay_required_payments:
          type:
            - integer
            - 'null'
          description: >-
            The total number of installment payments required before the
            subscription pauses. Null if split pay is not configured. Must be
            greater than 1.
          example: 42
        adaptive_pricing_enabled:
          type: boolean
          description: >-
            Whether the creator has turned on adaptive pricing for this plan.
            Raw setting — does not check processor compatibility or feature
            flags.
        payment_method_configuration:
          type:
            - object
            - 'null'
          properties:
            enabled:
              type: array
              items:
                $ref: '#/components/schemas/PaymentMethodTypes'
              description: >-
                An array of payment method identifiers that are explicitly
                enabled. This means these payment methods will be shown on
                checkout. Example use case is to only enable a specific payment
                method like cashapp, or extending the platform defaults with
                additional methods.
            disabled:
              type: array
              items:
                $ref: '#/components/schemas/PaymentMethodTypes'
              description: >-
                An array of payment method identifiers that are explicitly
                disabled. Only applies if the include_platform_defaults is true.
            include_platform_defaults:
              type: boolean
              description: >-
                Whether Whop's platform default payment method enablement
                settings are included in this configuration. The full list of
                default payment methods can be found in the documentation at
                docs.whop.com/payments.
          required:
            - enabled
            - disabled
            - include_platform_defaults
          description: >-
            The explicit payment method configuration specifying which payment
            methods are enabled or disabled for this plan. Null if the plan uses
            default settings.
