    get:
      tags:
        - App builds
      operationId: listAppBuild
      summary: List app builds
      description: >-
        Returns a paginated list of build artifacts for a given app, with
        optional filtering by platform, status, and creation date.


        Required permissions:
         - `developer:manage_builds`
      parameters:
        - name: after
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
            description: >-
              Returns the elements in the list that come after the specified
              cursor.
          explode: true
          style: form
        - name: before
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
            description: >-
              Returns the elements in the list that come before the specified
              cursor.
          explode: true
          style: form
        - name: first
          in: query
          required: false
          schema:
            type:
              - integer
              - 'null'
            description: Returns the first _n_ elements from the list.
            example: 42
          explode: true
          style: form
        - name: last
          in: query
          required: false
          schema:
            type:
              - integer
              - 'null'
            description: Returns the last _n_ elements from the list.
            example: 42
          explode: true
          style: form
        - name: app_id
          in: query
          required: true
          schema:
            type: string
            description: The unique identifier of the app to list builds for.
            example: app_xxxxxxxxxxxxxx
          explode: true
          style: form
        - name: platform
          in: query
          required: false
          schema:
            oneOf:
              - $ref: '#/components/schemas/AppBuildPlatforms'
              - type: 'null'
            description: Filter builds by target platform.
          explode: true
          style: form
        - name: status
          in: query
          required: false
          schema:
            oneOf:
              - $ref: '#/components/schemas/AppBuildStatuses'
              - type: 'null'
            description: Filter builds by review status.
          explode: true
          style: form
        - name: created_before
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
            format: date-time
            description: Only return builds created before this timestamp.
            example: '2023-12-01T05:00:00.401Z'
          explode: true
          style: form
        - name: created_after
          in: query
          required: false
          schema:
            type:
              - string
              - 'null'
