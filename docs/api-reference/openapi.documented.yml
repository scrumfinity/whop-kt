      description: >-
        A resolution center case is a dispute or support case between a user and
        a company, tracking the issue, status, and outcome.
    ResolutionCenterCaseActions:
      type: string
      enum:
        - created
        - responded
        - accepted
        - denied
        - appealed
        - withdrew
        - requested_more_info
        - escalated
        - dispute_opened
        - dispute_customer_won
        - dispute_merchant_won
      description: The different types of actions for a resolution event
    ResolutionCenterCaseReporters:
      type: string
      enum:
        - merchant
        - customer
        - platform
        - system
      description: The different types of reporters for a resolution event
    ResolutionCenterCase:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the resolution.
          example: reso_xxxxxxxxxxxxx
        status:
          $ref: '#/components/schemas/ResolutionCenterCaseStatuses'
          description: >-
            The current status of the resolution case, indicating which party
            needs to respond or if the case is closed.
        issue:
          $ref: '#/components/schemas/ResolutionCenterCaseIssueTypes'
          description: The category of the dispute.
        created_at:
          type: string
          format: date-time
          description: The datetime the resolution was created.
          example: '2023-12-01T05:00:00.401Z'
        updated_at:
          type: string
          format: date-time
          description: The datetime the resolution was last updated.
          example: '2023-12-01T05:00:00.401Z'
        due_date:
          type:
            - string
            - 'null'
          format: date-time
          description: >-
            The deadline by which the next response is required. Null if no
            deadline is currently active. As an ISO 8601 timestamp.
          example: '2023-12-01T05:00:00.401Z'
        customer_appealed:
          type: boolean
          description: >-
            Whether the customer has filed an appeal after the initial
            resolution decision.
        merchant_appealed:
          type: boolean
          description: >-
            Whether the merchant has filed an appeal after the initial
            resolution decision.
        customer_response_actions:
          type: array
          items:
            $ref: '#/components/schemas/ResolutionCenterCaseCustomerResponses'
          description: The list of actions currently available to the customer.
        merchant_response_actions:
          type: array
          items:
            $ref: '#/components/schemas/ResolutionCenterCaseMerchantResponses'
          description: The list of actions currently available to the merchant.
        company:
          type:
            - object
            - 'null'
          properties:
            id:
              type: string
              description: The unique identifier for the company.
              example: biz_xxxxxxxxxxxxxx
            title:
              type: string
              description: The display name of the company shown to customers.
              example: Pickaxe
          required:
            - id
            - title
          description: >-
            The company involved in this resolution case. Null if the company no
            longer exists.
        user:
          type: object
          properties:
            id:
              type: string
              description: The unique identifier for the user.
              example: user_xxxxxxxxxxxxx
            name:
              type:
                - string
                - 'null'
              description: The user's display name shown on their public profile.
              example: John Doe
            username:
              type: string
              description: The user's unique username shown on their public profile.
              example: johndoe42
          required:
            - id
            - name
            - username
          description: The customer (buyer) who filed this resolution case.
        platform_response_actions:
          type: array
          items:
            $ref: '#/components/schemas/ResolutionCenterCasePlatformResponses'
          description: >-
            The list of actions currently available to the Whop platform for
            moderating this resolution.
        payment:
          type: object
          properties:
            id:
              type: string
              description: The unique identifier for the payment.
              example: pay_xxxxxxxxxxxxxx
            currency:
              oneOf:
                - $ref: '#/components/schemas/Currencies'
                - type: 'null'
              description: >-
                The three-letter ISO currency code for this payment (e.g.,
                'usd', 'eur').
            created_at:
              type: string
              format: date-time
              description: The datetime the payment was created.
              example: '2023-12-01T05:00:00.401Z'
            paid_at:
              type:
                - string
                - 'null'
              format: date-time
              description: >-
                The time at which this payment was successfully collected. Null
                if the payment has not yet succeeded. As an ISO 8601 timestamp.
              example: '2023-12-01T05:00:00.401Z'
            total:
              type: number
              description: >-
                The total amount charged to the customer for this payment,
                including taxes and after any discounts. In the currency
                specified by the currency field.
              example: 6.9
            subtotal:
              type:
                - number
                - 'null'
              description: >-
                The payment amount before taxes and discounts are applied. In
                the currency specified by the currency field.
              example: 6.9
          required:
            - id
            - currency
            - created_at
            - paid_at
            - total
            - subtotal
          description: The payment record that is the subject of this resolution case.
        member:
          type:
            - object
            - 'null'
          properties:
            id:
              type: string
              description: The unique identifier for the extra public member.
          required:
            - id
          description: >-
            The membership record associated with the disputed payment. Null if
            the membership no longer exists.
        resolution_events:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The unique identifier for the resolution event.
                example: revt_xxxxxxxxxxxxx
              action:
                $ref: '#/components/schemas/ResolutionCenterCaseActions'
                description: The type of action recorded in this event.
              reporter_type:
                $ref: '#/components/schemas/ResolutionCenterCaseReporters'
                description: The party who performed this action.
              details:
                type:
                  - string
                  - 'null'
                description: >-
                  The message body or additional context provided with this
                  resolution event. Null if no details were included.
                example: I did not authorize this purchase.
              created_at:
                type: string
                format: date-time
                description: The datetime the resolution event was created.
                example: '2023-12-01T05:00:00.401Z'
            required:
              - id
              - action
              - reporter_type
              - details
              - created_at
            description: >-
              A resolution event is a message or action within a resolution
              case, such as a response, escalation, or status change.
          description: >-
            The most recent 50 messages, actions, and status changes that have
            occurred during this resolution case.
      required:
        - id
        - status
        - issue
        - created_at
        - updated_at
        - due_date
        - customer_appealed
        - merchant_appealed
        - customer_response_actions
        - merchant_response_actions
        - company
        - user
        - platform_response_actions
        - payment
        - member
        - resolution_events
      description: >-
        A resolution center case is a dispute or support case between a user and
        a company, tracking the issue, status, and outcome.
    CheckoutModes:
      type: string
      enum:
        - payment
        - setup
      description: The different modes a checkout can be set to.
    CheckoutConfigurationListItem:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the checkout session.
          example: ch_xxxxxxxxxxxxxxx
        company_id:
          type: string
          description: The ID of the company to use for the checkout configuration
        mode:
          $ref: '#/components/schemas/CheckoutModes'
          description: The mode of the checkout session.
        currency:
          oneOf:
            - $ref: '#/components/schemas/Currencies'
            - type: 'null'
          description: >-
            The currency to use for the configuration when in 'setup' mode. This
            is used to target which currency specific payment methods are
            available. If not provided, it will default to 'usd' when in setup
            mode.
        plan:
          type:
            - object
            - 'null'
          properties:
            id:
              type: string
              description: The unique identifier for the plan.
              example: plan_xxxxxxxxxxxxx
            visibility:
              $ref: '#/components/schemas/Visibility'
              description: >-
                Controls whether the plan is visible to customers. When set to
                'hidden', the plan is only accessible via direct link.
            plan_type:
              $ref: '#/components/schemas/PlanTypes'
              description: >-
                The billing model for this plan: 'renewal' for recurring
                subscriptions or 'one_time' for single payments.
            release_method:
              $ref: '#/components/schemas/ReleaseMethod'
              description: >-
                The method used to sell this plan: 'buy_now' for immediate
                purchase or 'waitlist' for waitlist-based access.
            currency:
              $ref: '#/components/schemas/Currencies'
              description: >-
                The currency used for all prices on this plan (e.g., 'usd',
                'eur'). All monetary amounts on the plan are denominated in this
                currency.
            billing_period:
              type:
                - integer
                - 'null'
              description: >-
                The number of days between each recurring charge. Null for
                one-time plans. For example, 30 for monthly or 365 for annual
                billing.
              example: 42
            expiration_days:
              type:
                - integer
                - 'null'
              description: >-
                The number of days until the membership expires (for
                expiration-based plans). For example, 365 for a one-year access
                pass.
              example: 42
            initial_price:
              type: number
              description: >-
                The initial purchase price in the plan's base_currency (e.g.,
                49.99 for $49.99). For one-time plans, this is the full price.
                For renewal plans, this is charged on top of the first
                renewal_price.
              example: 6.9
            renewal_price:
              type: number
              description: >-
                The recurring price charged every billing_period in the plan's
                base_currency (e.g., 9.99 for $9.99/period). Zero for one-time
                plans.
              example: 6.9
            trial_period_days:
              type:
                - integer
                - 'null'
              description: >-
                The number of free trial days before the first charge on a
                renewal plan. Null if no trial is configured or the current user
                has already used a trial for this plan.
              example: 42
            adaptive_pricing_enabled:
              type: boolean
              description: >-
                Whether the creator has turned on adaptive pricing for this
                plan. Raw setting — does not check processor compatibility or
                feature flags.
          required:
            - id
            - visibility
            - plan_type
            - release_method
            - currency
            - billing_period
            - expiration_days
            - initial_price
            - renewal_price
            - trial_period_days
            - adaptive_pricing_enabled
          description: The plan to use for the checkout configuration
        affiliate_code:
          type:
            - string
            - 'null'
          description: The affiliate code to use for the checkout configuration
        metadata:
          type:
            - object
            - 'null'
          additionalProperties: true
          description: The metadata to use for the checkout configuration
        redirect_url:
          type:
            - string
            - 'null'
          description: >-
            The URL to redirect the user to after the checkout configuration is
            created
        purchase_url:
          type: string
          description: >-
            A URL you can send to customers to complete a checkout. It looks
            like `/checkout/plan_xxxx?session={id}`
        allow_promo_codes:
          type: boolean
          description: >-
            Whether the checkout configuration allows promo codes. When false,
            the promo code input is hidden and promo codes are rejected.
        payment_method_configuration:
          type:
            - object
            - 'null'
          properties:
            enabled:
              type: array
              items:
                $ref: '#/components/schemas/PaymentMethodTypes'
              description: >-
                An array of payment method identifiers that are explicitly
                enabled. This means these payment methods will be shown on
                checkout. Example use case is to only enable a specific payment
                method like cashapp, or extending the platform defaults with
                additional methods.
            disabled:
              type: array
              items:
                $ref: '#/components/schemas/PaymentMethodTypes'
              description: >-
                An array of payment method identifiers that are explicitly
                disabled. Only applies if the include_platform_defaults is true.
            include_platform_defaults:
              type: boolean
              description: >-
                Whether Whop's platform default payment method enablement
                settings are included in this configuration. The full list of
                default payment methods can be found in the documentation at
                docs.whop.com/payments.
          required:
            - enabled
            - disabled
            - include_platform_defaults
          description: >-
            The explicit payment method configuration for the session, if any.
            This currently only works in 'setup' mode. Use the plan's
            payment_method_configuration for payment method.
      required:
        - id
        - company_id
        - mode
        - currency
        - plan
        - affiliate_code
        - metadata
        - redirect_url
        - purchase_url
        - allow_promo_codes
        - payment_method_configuration
