  /payments/{id}/refund:
    post:
      tags:
        - Payments
      operationId: refundPayment
      summary: Refund payment
      description: >-
        Issue a full or partial refund for a payment. The refund is processed
        through the original payment processor and the membership status is
        updated accordingly.


        Required permissions:
         - `payment:manage`
         - `plan:basic:read`
         - `access_pass:basic:read`
         - `member:email:read`
         - `member:basic:read`
         - `member:phone:read`
         - `promo_code:basic:read`
         - `payment:dispute:read`
         - `payment:resolution_center_case:read`
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the payment to refund.
          schema:
            type: string
            example: pay_xxxxxxxxxxxxxx
      x-group-title: Payins
      security:
        - bearerAuth:
            - payment:manage
            - plan:basic:read
            - access_pass:basic:read
            - member:email:read
            - member:basic:read
            - member:phone:read
